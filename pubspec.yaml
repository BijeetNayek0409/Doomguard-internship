name: doomguard
description: DoomGuard - Take back your screen time
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  workmanager: ^0.9.0+3
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.0.0
  go_router: ^13.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  fl_chart: ^0.67.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.2
  usage_stats: ^1.3.1
  google_fonts: ^6.1.0

  # --- Firebase ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.4

  # --- WebView ---
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true